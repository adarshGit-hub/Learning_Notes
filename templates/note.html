<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{NOTE_TITLE}} | Learning Wiki</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
  <link rel="stylesheet" href="{{THEME_CSS}}">
</head>
<body>

  <!-- Decorative mesh backgrounds -->
  <div class="bg-grid-mesh">
    <div class="bg-mesh-1"></div>
    <div class="bg-mesh-2"></div>
  </div>

  <!-- Mobile Header Bar -->
  <header class="mobile-header">
    <button id="mobile-sidebar-toggle" style="background: none; border: none; font-size: 1.5rem; color: var(--text-primary); cursor: pointer;">
      ☰
    </button>
    <div class="logo-title">Learning Notes</div>
    <div style="width: 24px;"></div> <!-- Spacer -->
  </header>

  <div class="shell">
    
    <!-- Left Navigation Sidebar -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <a href="index.html" style="display: flex; align-items: center; gap: 12px; color: inherit;">
          <div class="logo-circle">📝</div>
          <div>
            <div class="logo-text">Learning Notes</div>
            <div class="logo-sub">Knowledge Portal</div>
          </div>
        </a>
      </div>

      <!-- Quick filter notes list in sidebar -->
      <div class="sidebar-search">
        <input type="text" id="sidebar-search-input" placeholder="Quick find note...">
      </div>

      <!-- Dynamic Sidebar Navigation Links -->
      <div id="sidebar-nav-list">
        {{SIDEBAR_NAV}}
      </div>

      <!-- Theme Switcher Button at bottom -->
      <div class="theme-switch-wrapper">
        <button class="theme-switch-btn" id="theme-toggle">
          <span id="theme-btn-icon">🌙</span> <span id="theme-btn-text">Dark Mode</span>
        </button>
      </div>
    </nav>

    <!-- Main Content Shell -->
    <div class="main-wrapper">
      
      <!-- Primary Note Body -->
      <main class="main-content markdown-body fade-in">
        {{NOTE_CONTENT}}
      </main>

      <!-- Right Table of Contents Sidebar -->
      <aside class="toc-sidebar">
        <div class="toc-title">On This Page</div>
        <ul class="toc-list">
          {{TABLE_OF_CONTENTS}}
        </ul>
      </aside>
      
    </div>
  </div>

  <script>
    // Theme Switcher Logic
    const themeToggleBtn = document.getElementById('theme-toggle');
    const themeBtnIcon = document.getElementById('theme-btn-icon');
    const themeBtnText = document.getElementById('theme-btn-text');
    
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      if (theme === 'dark') {
        themeBtnIcon.textContent = '☀️';
        themeBtnText.textContent = 'Light Mode';
      } else {
        themeBtnIcon.textContent = '🌙';
        themeBtnText.textContent = 'Dark Mode';
      }
    }
    
    // Initialize Theme
    const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    setTheme(savedTheme);
    
    themeToggleBtn.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      setTheme(currentTheme === 'dark' ? 'light' : 'dark');
    });

    // Mobile Sidebar Toggle
    const mobileSidebarToggle = document.getElementById('mobile-sidebar-toggle');
    const sidebar = document.getElementById('sidebar');
    
    if (mobileSidebarToggle && sidebar) {
      mobileSidebarToggle.addEventListener('click', () => {
        sidebar.classList.toggle('open');
        if (sidebar.classList.contains('open')) {
          mobileSidebarToggle.textContent = '✕';
        } else {
          mobileSidebarToggle.textContent = '☰';
        }
      });
    }

    // Sidebar Note Finder
    const sidebarSearchInput = document.getElementById('sidebar-search-input');
    if (sidebarSearchInput) {
      sidebarSearchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        const navSections = document.querySelectorAll('.nav-section');
        
        navSections.forEach(section => {
          const items = section.querySelectorAll('.nav-item');
          let hasVisibleItem = false;
          
          items.forEach(item => {
            const text = item.textContent.toLowerCase();
            if (text.includes(query)) {
              item.style.display = 'flex';
              hasVisibleItem = true;
            } else {
              item.style.display = 'none';
            }
          });
          
          if (hasVisibleItem) {
            section.style.display = 'block';
          } else {
            section.style.display = 'none';
          }
        });
      });
    }

    // ScrollSpy for Active Table of Contents Link
    window.addEventListener('DOMContentLoaded', () => {
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          const id = entry.target.getAttribute('id');
          if (id) {
            const tocLink = document.querySelector(`.toc-link[href="#${id}"]`);
            if (tocLink) {
              if (entry.intersectionRatio > 0) {
                document.querySelectorAll('.toc-link').forEach(link => link.classList.remove('active'));
                tocLink.classList.add('active');
              }
            }
          }
        });
      }, { rootMargin: '0px 0px -60% 0px' });

      // Track all H2 and H3 elements in content
      document.querySelectorAll('.markdown-body h2, .markdown-body h3').forEach(heading => {
        if (heading.getAttribute('id')) {
          observer.observe(heading);
        }
      });
    });
  </script>
</body>
</html>
